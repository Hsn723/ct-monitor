pull_request_rules:
  - name: Automatic merge
    conditions:
      - "#approved-reviews-by>=1"
      - "#review-requested=0"
      - "#changes-requested-reviews-by=0"
    actions:
      merge:
        method: squash
  - name: Automatic merge for dependabot
    conditions:
      - author‾=^dependabot¥[bot¥]$
      - "#check-failure=0"
      - "#check-pending=0"
      - or:
        - files‾=^go¥.(mod|sum)$
        - files‾=^Dockerfile$
        - files‾=^((¥.github/workflows/.*)|(¥.pre-commit-config))¥.ya?ml$
      - -files‾=^(?!go¥.(mod|sum)$|Dockerfile$|((¥.github/workflows/.*)|(¥.pre-commit-config))¥.ya?ml$).*
    actions:
      review:
        type: APPROVE
      merge:
        method: squash
